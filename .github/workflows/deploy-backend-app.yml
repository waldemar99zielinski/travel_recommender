name: Deploy Backend App

on:
  workflow_call:
    inputs:
      image_tag:
        description: Image tag to deploy to the backend App Platform service.
        required: true
        type: string
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        required: true
      DIGITALOCEAN_BACKEND_APP_NAME:
        required: true
      DIGITALOCEAN_BACKEND_COMPONENT_NAME:
        required: true
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy to the backend App Platform service.
        required: true
        type: string

jobs:
  deploy:
    name: Update Backend App Platform Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve Backend Image Tag Override
        env:
          COMPONENT_NAME: ${{ secrets.DIGITALOCEAN_BACKEND_COMPONENT_NAME }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          IMAGE_TAG_ENV_NAME="IMAGE_TAG_${COMPONENT_NAME}"

          echo "${IMAGE_TAG_ENV_NAME}=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: DigitalOcean App Platform Deployment
        uses: digitalocean/app_action/deploy@v2.0.11
        with:
          app_name: ${{ secrets.DIGITALOCEAN_BACKEND_APP_NAME }}
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          print_deploy_logs: true
