name: Build Frontend Image

on:
  workflow_call:
    inputs:
      ref:
        description: Optional git ref to check out before building.
        required: false
        type: string
        default: ""
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        required: true
      DIGITALOCEAN_REGISTRY_NAME:
        required: true
    outputs:
      image_ref:
        description: Fully qualified frontend image reference pushed to DOCR.
        value: ${{ jobs.build.outputs.image_ref }}
      image_tag:
        description: Frontend image tag pushed to DOCR.
        value: ${{ jobs.build.outputs.image_tag }}
  workflow_dispatch:
    inputs:
      ref:
        description: Optional git ref to check out before building.
        required: false
        type: string
        default: ""

jobs:
  build:
    name: Build And Push Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Authenticate Docker To DOCR
        run: doctl registry login --expiry-seconds 1200

      - name: Resolve Image Metadata
        id: meta
        env:
          REGISTRY_NAME: ${{ secrets.DIGITALOCEAN_REGISTRY_NAME }}
        run: |
          set -euo pipefail
          IMAGE_REPOSITORY="app"
          VERSION="$(node -p "require('./frontend/package.json').version")"
          IMAGE_TAG="frontend-v_${VERSION}"
          IMAGE_REF="registry.digitalocean.com/${REGISTRY_NAME}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"

          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Fail If Git Tag Already Exists
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail

          if git ls-remote --exit-code --tags origin "refs/tags/${IMAGE_TAG}" >/dev/null 2>&1; then
            echo "Git tag already exists on origin: ${IMAGE_TAG}" >&2
            exit 1
          fi

      - name: Build And Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}
