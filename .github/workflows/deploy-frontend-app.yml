name: Deploy Frontend App

on:
  workflow_call:
    inputs:
      image_tag:
        description: Image tag to deploy to the frontend App Platform service.
        required: true
        type: string
    secrets:
      DIGITALOCEAN_ACCESS_TOKEN:
        required: true
      DIGITALOCEAN_REGISTRY_NAME:
        required: true
      DIGITALOCEAN_FRONTEND_APP_ID:
        required: true
      DIGITALOCEAN_FRONTEND_COMPONENT_NAME:
        required: true
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy to the frontend App Platform service.
        required: true
        type: string

jobs:
  deploy:
    name: Update Frontend App Platform Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Update Frontend App Spec
        env:
          DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          DIGITALOCEAN_REGISTRY_NAME: ${{ secrets.DIGITALOCEAN_REGISTRY_NAME }}
          APP_ID: ${{ secrets.DIGITALOCEAN_FRONTEND_APP_ID }}
          COMPONENT_NAME: ${{ secrets.DIGITALOCEAN_FRONTEND_COMPONENT_NAME }}
          IMAGE_REPOSITORY: frontend
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          API_URL="https://api.digitalocean.com/v2/apps/${APP_ID}"

          curl -fsS \
            -H "Authorization: Bearer ${DIGITALOCEAN_ACCESS_TOKEN}" \
            "${API_URL}" \
            > app.json

          if [ "$(jq -r --arg component "${COMPONENT_NAME}" '.app.spec.services | any(.name == $component)' app.json)" != "true" ]; then
            echo "Frontend App Platform component not found: ${COMPONENT_NAME}" >&2
            exit 1
          fi

          jq \
            --arg component "${COMPONENT_NAME}" \
            --arg registry "${DIGITALOCEAN_REGISTRY_NAME}" \
            --arg repository "${IMAGE_REPOSITORY}" \
            --arg tag "${IMAGE_TAG}" \
            '
              .app.spec
              | .services |= map(
                  if .name == $component then
                    .image = ((.image // {}) + {
                      registry_type: "DOCR",
                      registry: $registry,
                      repository: $repository,
                      tag: $tag
                    })
                  else
                    .
                  end
                )
            ' app.json > spec.json

          jq '{spec: .}' spec.json > update.json

          curl -fsS -X PUT \
            -H "Authorization: Bearer ${DIGITALOCEAN_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API_URL}" \
            --data @update.json \
            > response.json

          echo "Triggered frontend deployment for image registry.digitalocean.com/${DIGITALOCEAN_REGISTRY_NAME}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
          jq -r '.app.active_deployment.id // empty' response.json
