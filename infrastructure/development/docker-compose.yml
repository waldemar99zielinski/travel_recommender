services:
  postgres:
    build:
      context: ./pgsql
      dockerfile: pgsql.dockerfile
    image: hybrid-dev-postgres:latest
    container_name: hybrid-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in infrastructure/development/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in infrastructure/development/.env}
      POSTGRES_DB: ${POSTGRES_DB:-recommender}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
